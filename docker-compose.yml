services:
  mongo:
    image: mongo:8.2
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - ./.db-mongodb:/data/db:delegated
    healthcheck:
      test: ["CMD", "mongosh", "--username", "admin", "--password", "admin", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend
    ports:
      - 8080:8080
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_SECURITY_USER_NAME=user1
      - SPRING_SECURITY_USER_PASSWORD=123456
      - SPRING_DATA_MONGODB_HOST=mongo
      - SPRING_DATA_MONGODB_PORT=27017
      - SPRING_DATA_MONGODB_DATABASE=senior_database
      - SPRING_DATA_MONGODB_USERNAME=admin
      - SPRING_DATA_MONGODB_PASSWORD=admin
      - SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE=admin
    depends_on:
      mongo:
        condition: service_healthy

  ai-service:
    build: 
      context: ./ai-service
    ports:
      - 8000:8000
    volumes:
      - ./ai-service:/app
      - shared-media:/app/shared_data
    environment:
      - MONGODB_URI=mongodb://mongo:27017/senior_capstone
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION_NAME=course_materials
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - qdrant
      - mongo

  qdrant:
    image: qdrant/qdrant
    ports:
      - 6333:6333
      - 6334:6334
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    volumes:
      - qdrant-data:/qdrant/storage

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    working_dir: /frontend
    environment:
      - MONGODB_URI=mongodb://admin:admin@mongo:27017/senior_database?authSource=admin
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    volumes:
      - shared-media:/frontend/public
    command: npm start
    depends_on:
      backend:
        condition: service_started

  frontend-dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      target: frontend
    volumes:
      - .:/workspaces/senior-capstone-project
      - ./.devcontainer/frontend/.vscode:/workspaces/senior-capstone-project/.vscode
      - ~/.ssh:/home/senior/.ssh:cached
      - ~/.config:/home/senior/.config:cached
    ports:
      - 3001:3000
    command: sleep infinity
    depends_on:
      backend:
        condition: service_started
      mongo:
        condition: service_healthy

  backend-dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      target: backend
    volumes:
      - .:/workspaces/senior-capstone-project
      - ./.devcontainer/backend/.vscode:/workspaces/senior-capstone-project/.vscode
    ports:
      - 8081:8080
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_SECURITY_USER_NAME=user1
      - SPRING_SECURITY_USER_PASSWORD=123456
      - SPRING_DATA_MONGODB_HOST=mongo
      - SPRING_DATA_MONGODB_PORT=27017
      - SPRING_DATA_MONGODB_DATABASE=senior_database
      - SPRING_DATA_MONGODB_USERNAME=admin
      - SPRING_DATA_MONGODB_PASSWORD=admin
      - SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE=admin
    command: sleep infinity
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
  qdrant-data:
  shared-media:
